<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Spendwise</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue: #1a56db;
  --blue-dark: #1e3a8a;
  --blue-hero: #1a3a8f;
  --blue-light: #dbeafe;
  --white: #ffffff;
  --bg: #f0f4f8;
  --card: #ffffff;
  --text: #111827;
  --muted: #6b7280;
  --faint: #9ca3af;
  --border: #e5e7eb;
  --nav-h: 72px;
  --r: 14px;
  --r-sm: 10px;
}
html, body { height: 100%; overflow: hidden; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; }

.page { display: none; flex-direction: column; height: 100vh; overflow-y: auto; padding-bottom: calc(var(--nav-h) + 8px); -ms-overflow-style: none; scrollbar-width: none; }
.page::-webkit-scrollbar { display: none; }
.page.active { display: flex; }

/* HERO */
.hero { background: var(--blue-hero); padding: 52px 24px 28px; flex-shrink: 0; }
.hero-eye { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: rgba(255,255,255,0.45); text-transform: uppercase; margin-bottom: 3px; }
.hero-greet { font-size: 13px; color: rgba(255,255,255,0.65); margin-bottom: 2px; }
.hero-title { font-size: 26px; font-weight: 700; color: #fff; letter-spacing: -0.02em; }
.ring-wrap { display: flex; justify-content: center; margin: 24px 0 20px; }
.ring-box { position: relative; width: 160px; height: 160px; }
.ring-box canvas { position: absolute; top: 0; left: 0; width: 160px !important; height: 160px !important; }
.ring-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
.ring-pct { font-size: 34px; font-weight: 700; color: #fff; letter-spacing: -0.04em; line-height: 1; }
.ring-lbl { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 3px; }
.hero-row { display: grid; grid-template-columns: 1fr 1px 1fr 1px 1fr; }
.hero-stat { text-align: center; padding: 0 6px; }
.hs-lbl { font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 3px; }
.hs-val { font-size: 14px; font-weight: 700; color: #fff; }
.hs-val.gold { color: #fbbf24; }
.hero-div { background: rgba(255,255,255,0.15); }

/* CONTENT */
.content { padding: 18px 14px; flex: 1; }
.sec { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 12px; }

/* TOP CARDS */
.top-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; margin-bottom: 22px; }
.tc { background: var(--card); border-radius: var(--r-sm); padding: 13px 11px; border: 1px solid var(--border); position: relative; overflow: hidden; }
.tc-badge { position: absolute; top: 9px; right: 7px; font-size: 9px; font-weight: 700; color: var(--blue); background: var(--blue-light); padding: 2px 6px; border-radius: 99px; }
.tc-emoji { font-size: 22px; margin-bottom: 9px; display: block; }
.tc-name { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
.tc-amt { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 9px; }
.tc-bar { height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; }
.tc-fill { height: 100%; background: var(--blue); border-radius: 99px; }

/* TXN ROW */
.txn-list { display: flex; flex-direction: column; gap: 8px; }
.txn { display: flex; align-items: center; gap: 12px; background: var(--card); border-radius: var(--r-sm); padding: 13px 14px; border: 1px solid var(--border); }
.ti { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 19px; flex-shrink: 0; }
.tinfo { flex: 1; min-width: 0; }
.tname { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tmeta { font-size: 11px; color: var(--muted); margin-top: 1px; }
.tright { text-align: right; flex-shrink: 0; }
.tamt { font-size: 14px; font-weight: 700; color: var(--text); }
.tdate { font-size: 11px; color: var(--faint); margin-top: 1px; }
.tdel { background: none; border: none; cursor: pointer; color: var(--faint); font-size: 16px; padding: 4px; border-radius: 6px; margin-left: 2px; }
.tdel:hover { color: #dc2626; background: #fef2f2; }

/* PAGE HEADERS */
.ph { background: var(--blue-hero); padding: 52px 24px 24px; flex-shrink: 0; }
.ph-eye { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: rgba(255,255,255,0.45); text-transform: uppercase; margin-bottom: 6px; }
.ph-title { font-size: 26px; font-weight: 700; color: #fff; letter-spacing: -0.02em; }

/* MONTH NAV */
.mnav { display: flex; align-items: center; gap: 10px; padding: 14px 14px 8px; }
.mnav-lbl { font-size: 13px; font-weight: 600; color: var(--muted); flex: 1; text-align: center; }
.mnav-btn { width: 30px; height: 30px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; color: var(--muted); font-size: 18px; display: flex; align-items: center; justify-content: center; }
.mnav-btn:hover { border-color: var(--blue); color: var(--blue); }

/* CHART CARDS */
.ccrd { background: var(--card); border-radius: var(--r); border: 1px solid var(--border); padding: 18px; margin-bottom: 13px; }
.ccrd-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 14px; }
.cwrap { position: relative; height: 170px; }
.dwrap { position: relative; height: 210px; }
.ci-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.ci-row:last-child { border-bottom: none; }
.ci-icon { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
.ci-name { flex: 1; font-size: 13px; font-weight: 500; }
.ci-pct { font-size: 12px; color: var(--muted); margin-right: 6px; }
.ci-amt { font-size: 13px; font-weight: 700; }

/* BUDGET PAGE */
.bc { background: var(--card); border-radius: var(--r); border: 1px solid var(--border); padding: 20px; margin-bottom: 13px; }
.bc-lbl { font-size: 13px; color: var(--muted); margin-bottom: 5px; }
.bc-val { font-size: 30px; font-weight: 700; letter-spacing: -0.03em; }
.bc-sub { font-size: 12px; color: var(--faint); margin-top: 3px; }
.bi-wrap { display: flex; align-items: center; background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--r-sm); overflow: hidden; margin-bottom: 13px; transition: border-color 0.15s; }
.bi-wrap:focus-within { border-color: var(--blue); background: #fff; }
.bi-sym { padding: 0 12px; font-size: 16px; color: var(--muted); }
.bi-inp { flex: 1; padding: 14px 0; border: none; background: transparent; font-size: 22px; font-weight: 700; color: var(--text); font-family: 'DM Sans', sans-serif; outline: none; }
.btn-upd { width: 100%; padding: 14px; background: var(--blue-dark); color: #fff; border: none; border-radius: var(--r-sm); font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.15s; }
.btn-upd:hover { background: var(--blue-hero); }
.bc-hint { font-size: 11px; color: var(--faint); text-align: center; margin-top: 8px; }

/* FAB */
.fab { position: fixed; bottom: calc(var(--nav-h) + 14px); right: calc(50% - 240px + 16px); width: 54px; height: 54px; border-radius: 50%; background: var(--blue); color: #fff; border: none; font-size: 26px; cursor: pointer; box-shadow: 0 4px 16px rgba(26,86,219,0.4); display: flex; align-items: center; justify-content: center; z-index: 50; transition: transform 0.15s; }
.fab:hover { transform: scale(1.07); }
.fab:active { transform: scale(0.95); }
@media (max-width: 480px) { .fab { right: 16px; } }

/* MODAL */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.overlay.open { opacity: 1; pointer-events: all; }
.sheet { background: #fff; width: 100%; max-width: 480px; border-radius: 20px 20px 0 0; padding: 22px 18px 36px; transform: translateY(100%); transition: transform 0.28s cubic-bezier(.4,0,.2,1); }
.overlay.open .sheet { transform: translateY(0); }
.sh-handle { width: 36px; height: 4px; background: var(--border); border-radius: 99px; margin: 0 auto 18px; }
.sh-title { font-size: 17px; font-weight: 700; margin-bottom: 18px; }
.fg { margin-bottom: 12px; }
.fg label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); display: block; margin-bottom: 5px; }
.fg input, .fg select { width: 100%; padding: 12px 14px; background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--r-sm); font-size: 15px; color: var(--text); font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.15s; }
.fg input:focus, .fg select:focus { border-color: var(--blue); background: #fff; }
.fg2 { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
.btn-add { width: 100%; padding: 14px; background: var(--blue); color: #fff; border: none; border-radius: var(--r-sm); font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 6px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.15s; }
.btn-add:hover { background: var(--blue-dark); }
.btn-add:disabled { opacity: 0.6; cursor: not-allowed; }

/* BOTTOM NAV */
.bnav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #fff; border-top: 1px solid var(--border); display: grid; grid-template-columns: repeat(4, 1fr); height: var(--nav-h); z-index: 40; }
.ni { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; border: none; background: none; color: var(--faint); transition: color 0.15s; padding: 8px 4px; font-family: 'DM Sans', sans-serif; }
.ni.active { color: var(--blue); }
.ni-icon { font-size: 21px; line-height: 1; }
.ni-lbl { font-size: 11px; font-weight: 500; }

/* EMPTY / TOAST / SPINNER */
.empty { text-align: center; padding: 32px 16px; color: var(--faint); font-size: 13px; }
.toast { position: fixed; bottom: calc(var(--nav-h) + 72px); left: 50%; transform: translateX(-50%) translateY(12px); background: var(--text); color: #fff; padding: 10px 20px; border-radius: 99px; font-size: 13px; font-weight: 500; opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s; z-index: 200; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.err { background: #dc2626; }
.spin { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff; border-radius: 50%; animation: sp 0.7s linear infinite; }
@keyframes sp { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- HOME -->
<div id="pg-home" class="page active">
  <div class="hero">
    <div class="hero-eye" id="home-eye">MAY 2026</div>
    <div class="hero-greet">Hi there 👋</div>
    <div class="hero-title">Overview</div>
    <div class="ring-wrap">
      <div class="ring-box">
        <canvas id="ringC"></canvas>
        <div class="ring-inner"><div class="ring-pct" id="ring-pct">0%</div><div class="ring-lbl">used</div></div>
      </div>
    </div>
    <div class="hero-row">
      <div class="hero-stat"><div class="hs-lbl">Spent</div><div class="hs-val" id="hv-spent">₹0</div></div>
      <div class="hero-div"></div>
      <div class="hero-stat"><div class="hs-lbl">Left</div><div class="hs-val gold" id="hv-left">₹0</div></div>
      <div class="hero-div"></div>
      <div class="hero-stat"><div class="hs-lbl">Budget</div><div class="hs-val" id="hv-budget">₹0</div></div>
    </div>
  </div>
  <div class="content">
    <div class="sec">Top spending</div>
    <div class="top-grid" id="top-grid"></div>
    <div class="sec">Recent</div>
    <div class="txn-list" id="home-list"></div>
  </div>
</div>

<!-- EXPENSES -->
<div id="pg-expenses" class="page">
  <div class="ph">
    <div class="ph-eye" id="exp-eye"></div>
    <div class="ph-title">Expenses</div>
  </div>
  <div class="mnav">
    <button class="mnav-btn" onclick="changeMonth(-1)">&#8249;</button>
    <div class="mnav-lbl" id="exp-lbl"></div>
    <button class="mnav-btn" onclick="changeMonth(1)">&#8250;</button>
  </div>
  <div class="content" style="padding-top:6px;">
    <div class="txn-list" id="exp-list"></div>
  </div>
</div>

<!-- INSIGHTS -->
<div id="pg-insights" class="page">
  <div class="ph">
    <div class="ph-eye" id="ins-eye"></div>
    <div class="ph-title">Insights</div>
  </div>
  <div class="content">
    <div class="ccrd">
      <div class="ccrd-title">Spending trend</div>
      <div class="cwrap"><canvas id="trendC" role="img" aria-label="Monthly spending trend"></canvas></div>
    </div>
    <div class="ccrd">
      <div class="ccrd-title">This month by category</div>
      <div class="dwrap"><canvas id="donutC" role="img" aria-label="Category breakdown donut chart"></canvas></div>
      <div id="ci-list"></div>
    </div>
  </div>
</div>

<!-- BUDGET -->
<div id="pg-budget" class="page">
  <div class="ph">
    <div class="ph-eye" id="bud-eye"></div>
    <div class="ph-title">Monthly Budget</div>
  </div>
  <div class="content">
    <div class="bc">
      <div class="bc-lbl">Current budget</div>
      <div class="bc-val" id="bud-disp">₹0</div>
      <div class="bc-sub">per month</div>
    </div>
    <div class="bc" style="padding-bottom:8px;">
      <div class="ccrd-title" style="margin-bottom:13px;">Update budget</div>
      <div class="bi-wrap"><span class="bi-sym">₹</span><input class="bi-inp" type="number" id="bud-inp" placeholder="0" min="0" step="100" inputmode="numeric" /></div>
      <button class="btn-upd" onclick="saveBudget()">Update budget</button>
      <div class="bc-hint" id="bud-hint"></div>
    </div>
  </div>
</div>

<!-- FAB -->
<button class="fab" onclick="openModal()" aria-label="Add transaction">+</button>

<!-- MODAL -->
<div class="overlay" id="modal" onclick="closeOut(event)">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-title">Add transaction</div>
    <div class="fg"><label>Description</label><input type="text" id="inp-name" placeholder="e.g. Swiggy dinner" /></div>
    <div class="fg2">
      <div class="fg"><label>Amount (₹)</label><input type="number" id="inp-amt" placeholder="0" min="0" inputmode="numeric" /></div>
      <div class="fg"><label>Date</label><input type="date" id="inp-date" /></div>
    </div>
    <div class="fg"><label>Category</label><select id="inp-cat"></select></div>
    <button class="btn-add" id="add-btn" onclick="addTxn()"><span id="add-lbl">Add transaction</span></button>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bnav">
  <button class="ni active" onclick="go('home')" id="nav-home"><span class="ni-icon">🏠</span><span class="ni-lbl">Home</span></button>
  <button class="ni" onclick="go('expenses')" id="nav-expenses"><span class="ni-icon">☰</span><span class="ni-lbl">Expenses</span></button>
  <button class="ni" onclick="go('insights')" id="nav-insights"><span class="ni-icon">📊</span><span class="ni-lbl">Insights</span></button>
  <button class="ni" onclick="go('budget')" id="nav-budget"><span class="ni-icon">💼</span><span class="ni-lbl">Budget</span></button>
</nav>

<div class="toast" id="toast"></div>

<script>
const SB_URL = 'https://kzdeaytpweyjvchvfswm.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6ZGVheXRwd2V5anZjaHZmc3dtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5OTU3NDQsImV4cCI6MjA5NDU3MTc0NH0.eflh1yYcCVr4msCMzLERoC3hEBHE1VnsuDSt8D8WFf0';
const sb = supabase.createClient(SB_URL, SB_KEY);

const CATS = [
  {name:'Food',      emoji:'🍔', bg:'#fef3c7'},
  {name:'Transport', emoji:'🚌', bg:'#dbeafe'},
  {name:'Shopping',  emoji:'🛍️', bg:'#ede9fe'},
  {name:'Health',    emoji:'💊', bg:'#dcfce7'},
  {name:'Entertainment', emoji:'🎬', bg:'#fce7f3'},
  {name:'Bills',     emoji:'📄', bg:'#fef9c3'},
  {name:'Investment',emoji:'📈', bg:'#d1fae5'},
  {name:'Rent',      emoji:'🏠', bg:'#dbeafe'},
  {name:'Misc',      emoji:'📦', bg:'#f3f4f6'},
];
const CCOLORS = ['#1a56db','#0ea5e9','#6366f1','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#64748b'];

let txns = [], viewMonth = (() => { const d = new Date(); d.setDate(1); return d; })();
let budget = parseInt(localStorage.getItem('et_bud') || '30000');
let trendInst = null, donutInst = null, curPage = 'home';

const nowM = () => { const d = new Date(); d.setDate(1); return d; };
const fmtINR = n => '₹' + Math.round(n).toLocaleString('en-IN');
const fmtM = d => d.toLocaleString('en-IN', {month:'long', year:'numeric'});
const fmtMU = d => d.toLocaleString('en-IN', {month:'short', year:'numeric'}).toUpperCase();
const mk = d => d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
const mTxns = d => txns.filter(t => t.date && t.date.startsWith(mk(d)));

function toast(msg, err) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast' + (err ? ' err' : '') + ' show';
  setTimeout(() => el.classList.remove('show'), 2600);
}

async function load() {
  const {data, error} = await sb.from('expenses').select('*').order('date', {ascending: false});
  if (error) { toast('Could not load data', true); return; }
  txns = data || []; renderAll();
}

function drawRing(pct) {
  const canvas = document.getElementById('ringC');
  const dpr = devicePixelRatio || 1;
  canvas.width = 160 * dpr; canvas.height = 160 * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const [cx, cy, r, lw] = [80, 80, 64, 13];
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = lw; ctx.stroke();
  if (pct > 0) {
    const color = pct > .9 ? '#ef4444' : pct > .7 ? '#f59e0b' : '#fbbf24';
    ctx.beginPath(); ctx.arc(cx, cy, r, -Math.PI/2, -Math.PI/2 + Math.PI*2*Math.min(pct,1));
    ctx.strokeStyle = color; ctx.lineWidth = lw; ctx.lineCap = 'round'; ctx.stroke();
  }
}

function renderHome() {
  const t = mTxns(nowM());
  const spent = t.reduce((s,x) => s+Number(x.amount), 0);
  const left = budget - spent;
  const pct = budget > 0 ? spent/budget : 0;
  document.getElementById('home-eye').textContent = fmtMU(nowM());
  document.getElementById('ring-pct').textContent = Math.round(pct*100) + '%';
  document.getElementById('hv-spent').textContent = fmtINR(spent);
  document.getElementById('hv-left').textContent = fmtINR(Math.abs(left));
  document.getElementById('hv-budget').textContent = fmtINR(budget);
  drawRing(pct);

  const bycat = {};
  t.forEach(x => bycat[x.category] = (bycat[x.category]||0) + Number(x.amount));
  const sorted = Object.entries(bycat).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const maxA = sorted[0] ? sorted[0][1] : 1;
  const tg = document.getElementById('top-grid');
  tg.innerHTML = sorted.length ? sorted.map(([name,amt],i) => {
    const c = CATS.find(x=>x.name===name)||CATS[8];
    return `<div class="tc">${i===0?'<span class="tc-badge">Top</span>':''}<span class="tc-emoji">${c.emoji}</span><div class="tc-name">${name}</div><div class="tc-amt">${fmtINR(amt)}</div><div class="tc-bar"><div class="tc-fill" style="width:${Math.round(amt/maxA*100)}%"></div></div></div>`;
  }).join('') : '<div class="empty" style="grid-column:1/-1">No spending yet</div>';

  document.getElementById('home-list').innerHTML = txns.slice(0,6).map(txnHTML).join('') || '<div class="empty">No transactions yet</div>';
}

function renderExp() {
  document.getElementById('exp-eye').textContent = fmtMU(viewMonth);
  document.getElementById('exp-lbl').textContent = fmtM(viewMonth);
  const t = mTxns(viewMonth);
  document.getElementById('exp-list').innerHTML = t.length ? t.map(txnHTML).join('') : '<div class="empty">No transactions this month</div>';
}

function renderInsights() {
  const now = nowM();
  document.getElementById('ins-eye').textContent = fmtMU(now);
  const months = Array.from({length:6}, (_,i) => { const d=new Date(now); d.setMonth(d.getMonth()-5+i); return {lbl:d.toLocaleString('en-IN',{month:'short'}), total:mTxns(d).reduce((s,t)=>s+Number(t.amount),0), isCur:i===5}; });
  if (trendInst) trendInst.destroy();
  trendInst = new Chart(document.getElementById('trendC'), {
    type:'bar', data:{ labels:months.map(m=>m.lbl), datasets:[{data:months.map(m=>m.total), backgroundColor:months.map(m=>m.isCur?'#1a3a8f':'#bfdbfe'), borderRadius:6, borderSkipped:false}] },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:12}}},y:{display:false}}}
  });

  const t = mTxns(now);
  const total = t.reduce((s,x)=>s+Number(x.amount),0);
  const bycat = {};
  t.forEach(x=>bycat[x.category]=(bycat[x.category]||0)+Number(x.amount));
  const acs = CATS.filter(c=>bycat[c.name]>0);
  if (donutInst) donutInst.destroy();
  if (acs.length) {
    donutInst = new Chart(document.getElementById('donutC'), {
      type:'doughnut', data:{labels:acs.map(c=>c.name), datasets:[{data:acs.map(c=>bycat[c.name]), backgroundColor:acs.map((_,i)=>CCOLORS[i%CCOLORS.length]), borderWidth:2, borderColor:'#fff', hoverOffset:4}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{display:false}}}
    });
    document.getElementById('ci-list').innerHTML = acs.sort((a,b)=>bycat[b.name]-bycat[a.name]).map((c,i)=>
      `<div class="ci-row"><div class="ci-icon" style="background:${c.bg}">${c.emoji}</div><div class="ci-name">${c.name}</div><div class="ci-pct">${Math.round(bycat[c.name]/total*100)}%</div><div class="ci-amt">${fmtINR(bycat[c.name])}</div></div>`
    ).join('');
  } else {
    document.getElementById('ci-list').innerHTML = '<div class="empty">No data this month</div>';
  }
}

function renderBudget() {
  const now = nowM();
  document.getElementById('bud-eye').textContent = fmtMU(now);
  document.getElementById('bud-disp').textContent = fmtINR(budget);
  document.getElementById('bud-inp').value = budget||'';
  document.getElementById('bud-hint').textContent = 'Your budget applies to ' + fmtM(now) + '. You can update it any time.';
}

function txnHTML(t) {
  const c = CATS.find(x=>x.name===t.category)||CATS[8];
  const d = new Date(t.date+'T00:00:00');
  const ds = d.toLocaleDateString('en-IN',{month:'long',day:'numeric',year:'numeric'});
  return `<div class="txn"><div class="ti" style="background:${c.bg}">${c.emoji}</div><div class="tinfo"><div class="tname">${t.category}</div><div class="tmeta">${t.name}</div></div><div class="tright"><div class="tamt">${fmtINR(t.amount)}</div><div class="tdate">${ds}</div></div><button class="tdel" onclick="delTxn('${t.id}')">✕</button></div>`;
}

function renderAll() { renderHome(); renderExp(); renderBudget(); if (curPage==='insights') renderInsights(); }

function go(p) {
  curPage = p;
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.ni').forEach(x=>x.classList.remove('active'));
  document.getElementById('pg-'+p).classList.add('active');
  document.getElementById('nav-'+p).classList.add('active');
  if (p==='insights') renderInsights();
}

function changeMonth(d) { viewMonth=new Date(viewMonth); viewMonth.setMonth(viewMonth.getMonth()+d); renderExp(); }

function openModal() { document.getElementById('modal').classList.add('open'); document.getElementById('inp-name').focus(); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function closeOut(e) { if (e.target===document.getElementById('modal')) closeModal(); }

async function addTxn() {
  const name = document.getElementById('inp-name').value.trim();
  const amount = parseFloat(document.getElementById('inp-amt').value);
  const category = document.getElementById('inp-cat').value;
  const date = document.getElementById('inp-date').value;
  if (!name||!amount||!date) { toast('Fill in all fields', true); return; }
  const btn = document.getElementById('add-btn'), lbl = document.getElementById('add-lbl');
  btn.disabled=true; lbl.innerHTML='<span class="spin"></span>';
  const {data, error} = await sb.from('expenses').insert([{name,amount,category,date}]).select().single();
  btn.disabled=false; lbl.textContent='Add transaction';
  if (error) { toast('Failed: '+error.message, true); return; }
  txns.unshift(data);
  document.getElementById('inp-name').value='';
  document.getElementById('inp-amt').value='';
  closeModal(); toast('Transaction added ✓'); renderAll();
}

async function delTxn(id) {
  if (!confirm('Delete this transaction?')) return;
  const {error} = await sb.from('expenses').delete().eq('id',id);
  if (error) { toast('Delete failed', true); return; }
  txns = txns.filter(t=>t.id!==id); toast('Deleted'); renderAll();
}

function saveBudget() {
  const v = parseFloat(document.getElementById('bud-inp').value);
  if (!isNaN(v)&&v>=0) { budget=v; localStorage.setItem('et_bud',v); renderAll(); toast('Budget updated ✓'); }
}

const sel = document.getElementById('inp-cat');
CATS.forEach(c => { const o=document.createElement('option'); o.value=c.name; o.textContent=c.emoji+' '+c.name; sel.appendChild(o); });
document.getElementById('inp-date').valueAsDate = new Date();
load();
</script>
</body>
</html>
